<!DOCTYPE html>
<html>
    <head>
        <title>Página Inicial</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

        <style>
            body {
                margin: 0;
                padding: 150px;
                font-family: Arial, sans-serif;
                background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
                color: #ffffff;
                 flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                text-align: center;
            }

            h1 {
                font-size: 2.5em;
                margin-bottom: 20px;
                color: #00ffe1;
                text-shadow: 0 0 10px #00ffe1, 0 0 20px #00ffe1;
            }

            p {
                font-size: 1.2em;
            }

            a {
                color: #ff00ff;
                text-decoration: none;
                font-weight: bold;
                padding: 10px 20px;
                border: 2px solid #ff00ff;
                border-radius: 8px;
                transition: 0.3s;
                box-shadow: 0 0 10px #ff00ff;
            }

            a:hover {
                background-color: #ff00ff;
                color: #000;
                box-shadow: 0 0 20px #ff00ff;
            }
        </style>
    </head>
    <body>
        <h1>Bem vindo ao Game Manager 🎮</h1>
        <br>
        <p>Clique <a href="login.jsp">aqui</a> para fazer login</p>
    </body>
</html>
